      <!-- Modal -->
      <div
        class="modal fade"
        id="modalEvento"
        tabindex="-1"
        aria-labelledby="modalEventoLabel"
        aria-hidden="true"
      >
        <div class="modal-dialog modal-dialog-centered">
          <div class="modal-content">
            <div class="modal-header">
              <h5 class="modal-title" id="modalEventoLabel"></h5>
              <button
                type="button"
                class="btn-close"
                data-bs-dismiss="modal"
                aria-label="Close"
              ></button>
            </div>

            <div class="modal-body">
              <p id="modalEventoDescripcion"></p>

              <p class="modal-info modal-horario">
                <strong>Horario:</strong>
                <span id="modalEventoHorario"></span>
              </p>

              <p class="modal-info modal-ubicacion">
                <strong>Ubicación:</strong>
                <span id="modalEventoUbicacion"></span>
              </p>

              <div
                id="mapEvento"
                style="height: 240px; border-radius: 12px"
              ></div>
            </div>

            <div class="modal-footer">
              <button
                type="button"
                class="btn btn-secondary"
                data-bs-dismiss="modal"
              >
                Cerrar
              </button>
            </div>
          </div>
        </div>
